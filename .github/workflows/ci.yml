name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pathlogs
          POSTGRES_PASSWORD: pathlogs
          POSTGRES_DB: pathlogs
        ports:
          - "5433:5432"
        options: >-
          --health-cmd "pg_isready -U pathlogs -d pathlogs"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://pathlogs:pathlogs@localhost:5433/pathlogs
      DATABASE_URL_UNPOOLED: postgresql://pathlogs:pathlogs@localhost:5433/pathlogs
      AUTH_SECRET: ci-only-secret-not-for-production
      AUTH_TRUST_HOST: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      # Тесты сами создают БД pathlogs_test через prisma db push (tests/global-setup.ts)
      - name: Tests
        run: npm test

      - name: Apply schema for build
        run: npx prisma db push --skip-generate

      - name: Build
        run: npm run build
