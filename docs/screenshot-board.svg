<svg width="1200" height="640" viewBox="0 0 1200 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Канбан-доска PathLogs">
  <defs>
    <style>
      text { font-family: 'Segoe UI', system-ui, sans-serif; }
      .muted { fill: #8a94ab; }
      .fg { fill: #e5e9f2; }
    </style>
  </defs>
  <rect width="1200" height="640" fill="#0b0f1a"/>

  <!-- sidebar -->
  <rect x="0" y="0" width="220" height="640" fill="#111827"/>
  <rect x="0" y="0" width="220" height="640" fill="none" stroke="#243049"/>
  <rect x="24" y="26" width="34" height="34" rx="9" fill="#6366f1"/>
  <text x="41" y="49" font-size="18" font-weight="800" fill="#fff" text-anchor="middle">P</text>
  <text x="70" y="48" font-size="17" font-weight="700" class="fg">PathLogs</text>
  <rect x="14" y="84" width="192" height="36" rx="9" fill="#1a2235"/>
  <text x="30" y="107" font-size="14" class="fg">Проекты</text>
  <text x="30" y="148" font-size="14" class="muted">Мои задачи</text>
  <text x="30" y="184" font-size="14" class="muted">Уведомления</text>
  <circle cx="196" cy="179" r="9" fill="#6366f1"/>
  <text x="196" y="183" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">3</text>

  <!-- header -->
  <rect x="244" y="26" width="44" height="26" rx="6" fill="#1e2747"/>
  <text x="266" y="44" font-size="13" font-weight="700" fill="#818cf8" text-anchor="middle">PAY</text>
  <text x="300" y="46" font-size="22" font-weight="700" class="fg">Платёжный сервис</text>
  <g transform="translate(980,28)">
    <rect width="92" height="34" rx="9" fill="none" stroke="#243049"/>
    <text x="46" y="22" font-size="13" class="muted" text-anchor="middle">Экспорт</text>
    <rect x="100" y="0" width="92" height="34" rx="9" fill="#6366f1"/>
    <text x="146" y="22" font-size="13" font-weight="600" fill="#fff" text-anchor="middle">+ Задача</text>
  </g>

  <!-- tabs -->
  <g transform="translate(244,74)">
