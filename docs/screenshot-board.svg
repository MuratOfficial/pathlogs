    <!-- Col 1: К выполнению -->
    <g transform="translate(0,0)">
      <rect width="220" height="470" rx="16" fill="#111827" stroke="#243049"/>
      <rect width="220" height="3" rx="2" fill="#94a3b8"/>
      <text x="16" y="34" font-size="13" font-weight="600" class="fg">К выполнению</text>
      <rect x="176" y="20" width="30" height="20" rx="10" fill="#1a2235"/>
      <text x="191" y="34" font-size="11" class="muted" text-anchor="middle">3</text>
      <!-- cards -->
      <g transform="translate(12,52)">
        <rect width="196" height="92" rx="12" fill="#0f1626" stroke="#243049"/>
        <text x="14" y="24" font-size="11" font-weight="700" class="muted">PAY-7</text>
        <rect x="58" y="13" width="56" height="16" rx="5" fill="#6366f1" opacity="0.2"/>
        <text x="86" y="25" font-size="10" fill="#818cf8" text-anchor="middle">Фича</text>
        <text x="14" y="50" font-size="13" class="fg">Сверка транзакций</text>
        <circle cx="24" cy="72" r="10" fill="#312e81"/>
        <text x="24" y="76" font-size="9" fill="#a5b4fc" text-anchor="middle">МТ</text>
        <rect x="150" y="64" width="40" height="16" rx="5" fill="#1a2235"/>
        <text x="170" y="76" font-size="9" class="muted" text-anchor="middle">2/5</text>
      </g>
      <g transform="translate(12,156)">
        <rect width="196" height="82" rx="12" fill="#0f1626" stroke="#243049"/>
        <text x="14" y="24" font-size="11" font-weight="700" class="muted">PAY-9</text>
        <rect x="58" y="13" width="44" height="16" rx="5" fill="#ef4444" opacity="0.2"/>
        <text x="80" y="25" font-size="10" fill="#f87171" text-anchor="middle">Баг</text>
        <text x="14" y="50" font-size="13" class="fg">Двойное списание</text>
        <circle cx="24" cy="68" r="10" fill="#3b1d3a"/>
        <text x="24" y="72" font-size="9" fill="#f0abfc" text-anchor="middle">АА</text>
      </g>
    </g>
    <!-- Col 2: В работе (WIP over) -->
    <g transform="translate(236,0)">
      <rect width="220" height="470" rx="16" fill="#1a0f12" stroke="#ef4444" stroke-opacity="0.5"/>
      <rect width="220" height="3" rx="2" fill="#ef4444"/>
      <text x="16" y="34" font-size="13" font-weight="600" class="fg">В работе</text>
      <rect x="170" y="20" width="36" height="20" rx="10" fill="#ef4444" opacity="0.2"/>
      <text x="188" y="34" font-size="11" font-weight="700" fill="#f87171" text-anchor="middle">3/2</text>
      <g transform="translate(12,52)">
        <rect width="196" height="92" rx="12" fill="#101a2e" stroke="#60a5fa" stroke-opacity="0.4"/>
        <text x="14" y="24" font-size="11" font-weight="700" class="muted">PAY-3</text>
        <rect x="58" y="13" width="56" height="16" rx="5" fill="#6366f1" opacity="0.2"/>
        <text x="86" y="25" font-size="10" fill="#818cf8" text-anchor="middle">Фича</text>
        <text x="14" y="50" font-size="13" class="fg">API эндпоинты оплаты</text>
        <circle cx="24" cy="72" r="10" fill="#312e81"/>
        <text x="24" y="76" font-size="9" fill="#a5b4fc" text-anchor="middle">ДР</text>
        <rect x="150" y="64" width="40" height="16" rx="5" fill="#1a2235"/>
        <text x="170" y="76" font-size="9" class="muted" text-anchor="middle">18ч</text>
      </g>
      <g transform="translate(12,156)">
        <rect width="196" height="78" rx="12" fill="#101a2e" stroke="#243049"/>
        <text x="14" y="24" font-size="11" font-weight="700" class="muted">PAY-5</text>
        <text x="14" y="48" font-size="13" class="fg">Идемпотентность</text>
        <circle cx="24" cy="64" r="10" fill="#312e81"/>
        <text x="24" y="68" font-size="9" fill="#a5b4fc" text-anchor="middle">ДР</text>
      </g>
      <g transform="translate(12,246)">
        <rect width="196" height="72" rx="12" fill="#101a2e" stroke="#243049"/>
        <text x="14" y="24" font-size="11" font-weight="700" class="muted">PAY-4</text>
        <text x="14" y="48" font-size="13" class="fg">Вебхуки провайдера</text>
      </g>
    </g>
    <!-- Col 3: На проверке -->
    <g transform="translate(472,0)">
      <rect width="220" height="470" rx="16" fill="#111827" stroke="#243049"/>
      <rect width="220" height="3" rx="2" fill="#c084fc"/>
      <text x="16" y="34" font-size="13" font-weight="600" class="fg">На проверке</text>
      <rect x="176" y="20" width="30" height="20" rx="10" fill="#1a2235"/>
      <text x="191" y="34" font-size="11" class="muted" text-anchor="middle">1</text>
      <g transform="translate(12,52)">
        <rect width="196" height="92" rx="12" fill="#0f1626" stroke="#243049"/>
        <text x="14" y="24" font-size="11" font-weight="700" class="muted">PAY-2</text>
        <rect x="58" y="13" width="86" height="16" rx="5" fill="#06b6d4" opacity="0.2"/>
        <text x="101" y="25" font-size="10" fill="#67e8f9" text-anchor="middle">Аналитика</text>
        <text x="14" y="50" font-size="13" class="fg">Дашборд платежей</text>
