    <text x="120" y="24" font-size="13" class="muted">Граф</text>
    <text x="186" y="24" font-size="13" class="muted">Список</text>
    <text x="258" y="24" font-size="13" class="muted">Гант</text>
    <text x="320" y="24" font-size="13" class="muted">Аналитика</text>
  </g>

