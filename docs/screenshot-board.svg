        <text x="24" y="76" font-size="9" fill="#f0abfc" text-anchor="middle">АА</text>
      </g>
    </g>
    <!-- Col 4: Готово -->
    <g transform="translate(708,0)">
      <rect width="220" height="470" rx="16" fill="#111827" stroke="#243049"/>
      <rect width="220" height="3" rx="2" fill="#4ade80"/>
      <text x="16" y="34" font-size="13" font-weight="600" class="fg">Готово</text>
      <rect x="176" y="20" width="30" height="20" rx="10" fill="#1a2235"/>
      <text x="191" y="34" font-size="11" class="muted" text-anchor="middle">1</text>
      <g transform="translate(12,52)">
        <rect width="196" height="82" rx="12" fill="#0f1626" stroke="#243049"/>
        <text x="14" y="24" font-size="11" font-weight="700" class="muted">PAY-1</text>
        <rect x="58" y="13" width="92" height="16" rx="5" fill="#ec4899" opacity="0.2"/>
        <text x="104" y="25" font-size="10" fill="#f9a8d4" text-anchor="middle">Менеджмент</text>
        <text x="14" y="50" font-size="13" class="fg">Интеграция шлюза</text>
        <rect x="14" y="62" width="120" height="6" rx="3" fill="#1a2235"/>
        <rect x="14" y="62" width="120" height="6" rx="3" fill="#4ade80"/>
      </g>
    </g>
