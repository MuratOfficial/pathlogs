<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Аналитика проекта PathLogs">
  <defs>
    <style>
      text { font-family: 'Segoe UI', system-ui, sans-serif; }
      .muted { fill: #8a94ab; }
      .fg { fill: #e5e9f2; }
      .cap { fill: #8a94ab; font-size: 12px; letter-spacing: 1px; }
    </style>
  </defs>
  <rect width="1200" height="560" fill="#0b0f1a"/>

  <text x="40" y="50" font-size="22" font-weight="700" class="fg">Аналитика · Платёжный сервис</text>

  <!-- stat cards -->
  <g transform="translate(40,76)">
    <g>
      <rect width="210" height="84" rx="16" fill="#111827" stroke="#243049"/>
      <text x="20" y="44" font-size="26" font-weight="800" class="fg">42</text>
      <text x="20" y="66" class="cap">ВСЕГО ЗАДАЧ</text>
    </g>
    <g transform="translate(226,0)">
      <rect width="210" height="84" rx="16" fill="#111827" stroke="#243049"/>
      <text x="20" y="44" font-size="26" font-weight="800" fill="#4ade80">68%</text>
      <text x="20" y="66" class="cap">ЗАВЕРШЕНО</text>
    </g>
    <g transform="translate(452,0)">
      <rect width="210" height="84" rx="16" fill="#111827" stroke="#243049"/>
      <text x="20" y="44" font-size="26" font-weight="800" fill="#ef4444">3</text>
      <text x="20" y="66" class="cap">ПРОСРОЧЕНО</text>
    </g>
    <g transform="translate(678,0)">
      <rect width="210" height="84" rx="16" fill="#111827" stroke="#243049"/>
      <text x="20" y="44" font-size="26" font-weight="800" class="fg">224 ч</text>
      <text x="20" y="66" class="cap">ПОТРАЧЕНО</text>
    </g>
    <g transform="translate(904,0)">
      <rect width="216" height="84" rx="16" fill="#111827" stroke="#243049"/>
      <text x="20" y="44" font-size="26" font-weight="800" fill="#818cf8">448 000</text>
      <text x="20" y="66" class="cap">СТОИМОСТЬ</text>
    </g>
  </g>

  <!-- by type bars -->
  <g transform="translate(40,184)">
    <rect width="360" height="220" rx="16" fill="#111827" stroke="#243049"/>
    <text x="20" y="34" class="cap">ПО ТИПАМ</text>
    <g transform="translate(20,56)" font-size="12">
      <text y="14" class="muted">Фича</text><rect x="80" y="3" width="180" height="14" rx="4" fill="#6366f1"/>
      <text y="44" class="muted">Баг</text><rect x="80" y="33" width="110" height="14" rx="4" fill="#ef4444"/>
      <text y="74" class="muted">Аналитика</text><rect x="80" y="63" width="80" height="14" rx="4" fill="#06b6d4"/>
      <text y="104" class="muted">Дизайн</text><rect x="80" y="93" width="60" height="14" rx="4" fill="#a855f7"/>
      <text y="134" class="muted">Рефактор</text><rect x="80" y="123" width="44" height="14" rx="4" fill="#f59e0b"/>
    </g>
  </g>

  <!-- weekly dynamics -->
  <g transform="translate(420,184)">
    <rect width="360" height="220" rx="16" fill="#111827" stroke="#243049"/>
    <text x="20" y="34" class="cap">ДИНАМИКА ПО НЕДЕЛЯМ</text>
    <g transform="translate(28,60)">
      <!-- bars created (indigo) / closed (green) -->
      <g>
        <rect x="0" y="80" width="14" height="40" rx="3" fill="#6366f1" opacity="0.7"/><rect x="16" y="96" width="14" height="24" rx="3" fill="#4ade80" opacity="0.7"/>
        <rect x="48" y="56" width="14" height="64" rx="3" fill="#6366f1" opacity="0.7"/><rect x="64" y="72" width="14" height="48" rx="3" fill="#4ade80" opacity="0.7"/>
        <rect x="96" y="40" width="14" height="80" rx="3" fill="#6366f1" opacity="0.7"/><rect x="112" y="64" width="14" height="56" rx="3" fill="#4ade80" opacity="0.7"/>
        <rect x="144" y="60" width="14" height="60" rx="3" fill="#6366f1" opacity="0.7"/><rect x="160" y="40" width="14" height="80" rx="3" fill="#4ade80" opacity="0.7"/>
        <rect x="192" y="72" width="14" height="48" rx="3" fill="#6366f1" opacity="0.7"/><rect x="208" y="32" width="14" height="88" rx="3" fill="#4ade80" opacity="0.7"/>
        <rect x="240" y="88" width="14" height="32" rx="3" fill="#6366f1" opacity="0.7"/><rect x="256" y="48" width="14" height="72" rx="3" fill="#4ade80" opacity="0.7"/>
      </g>
      <g transform="translate(0,140)" font-size="11">
        <rect width="10" height="10" rx="2" fill="#6366f1" opacity="0.7"/><text x="16" y="9" class="muted">создано</text>
        <rect x="90" width="10" height="10" rx="2" fill="#4ade80" opacity="0.7"/><text x="106" y="9" class="muted">закрыто</text>
      </g>
    </g>
  </g>

  <!-- estimate vs fact -->
  <g transform="translate(800,184)">
    <rect width="320" height="220" rx="16" fill="#111827" stroke="#243049"/>
    <text x="20" y="34" class="cap">ОЦЕНКА VS ФАКТ</text>
    <g transform="translate(20,56)" font-size="11">
      <text y="10" class="fg">PAY-3 · API оплаты</text>
      <rect y="18" width="280" height="8" rx="4" fill="#1a2235"/><rect y="18" width="210" height="8" rx="4" fill="#4ade80"/>
      <text y="50" class="fg">PAY-5 · Идемпотентность</text>
      <rect y="58" width="280" height="8" rx="4" fill="#1a2235"/><rect y="58" width="160" height="8" rx="4" fill="#4ade80"/>
      <text y="90" class="fg">PAY-9 · Двойное списание</text>
      <rect y="98" width="280" height="8" rx="4" fill="#1a2235"/><rect y="98" width="280" height="8" rx="4" fill="#ef4444"/>
      <text y="130" class="fg">PAY-2 · Дашборд</text>
      <rect y="138" width="280" height="8" rx="4" fill="#1a2235"/><rect y="138" width="120" height="8" rx="4" fill="#4ade80"/>
    </g>
  </g>

  <!-- hours by user -->
  <g transform="translate(40,424)">
    <rect width="1080" height="104" rx="16" fill="#111827" stroke="#243049"/>
    <text x="20" y="32" class="cap">ЧАСЫ И СТОИМОСТЬ ПО СОТРУДНИКАМ</text>
    <g transform="translate(20,48)" font-size="12">
      <text y="14" class="muted">Дмитрий Р.</text><rect x="140" y="3" width="380" height="14" rx="4" fill="#6366f1"/><text x="532" y="14" class="fg">96 ч · 192 000</text>
      <text y="40" class="muted">Мария М.</text><rect x="140" y="29" width="220" height="14" rx="4" fill="#6366f1"/><text x="372" y="40" class="fg">55 ч · 110 000</text>
    </g>
  </g>
</svg>
